<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500">
  <defs>
    <linearGradient id="gradBlueGreen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0b3b75"/>
      <stop offset="100%" stop-color="#1f7a5c"/>
    </linearGradient>
  </defs>

  <!-- Texto -->
  <text x="300" y="120"
        font-family="Georgia, serif"
        font-size="95"
        font-weight="bold"
        fill="url(#gradBlueGreen)"
        text-anchor="middle">
    ContaEC
  </text>

  <!-- Icono libro/check -->
  <g transform="translate(180,170)">
    
    <!-- Libro izquierdo -->
    <path d="M20 40 L120 20 L120 160 L20 140 Z"
          fill="#0b3b75"/>

    <!-- Libro derecho -->
    <path d="M120 20 L220 0 L220 180 L120 160 Z"
          fill="#1f7a5c"/>

    <!-- Check -->
    <path d="M30 120 L90 170 L210 40"
          fill="none"
          stroke="white"
          stroke-width="14"
          stroke-linecap="round"
          stroke-linejoin="round"/>
  </g>
</svg>
